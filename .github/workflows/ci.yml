name: CI

on:
  pull_request:
    branches: [main]
  # Also run on pushes to feature branches so you get feedback before opening a PR.
  push:
    branches-ignore: [main]

# Cancel in-progress runs of the same workflow on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI builds use a placeholder URL. Real deploys (see deploy.yml) override it.
  NEXT_PUBLIC_SITE_URL: "https://example.com"
  BASE_PATH: ""

jobs:
  verify:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
